<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Reviewer Intense</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <button id="back-btn" class="back-btn" title="Back to home">←</button>
            <span id="progress-tag">0/0</span>
        </div>

        <div class="card-container">
            <div id="card" class="card">
                <!-- Edit toolbar (hidden by default, shown in edit mode) -->
                <div id="edit-toolbar" class="edit-toolbar" style="display: none;">
                    <button id="cancel-edit-btn" class="edit-btn" title="Cancel edit">×</button>
                    <button id="save-edit-btn" class="edit-btn save-btn" title="Save changes">✓</button>
                </div>
                <!-- Edit pencil icon (shown when answer is visible) -->
                <button id="edit-pencil-btn" class="edit-pencil-btn" title="Edit this question" style="display: none; opacity: 0.3; cursor: not-allowed;">✏️</button>

                <div id="content-q" class="text-display">Please select a knowledge base to start</div>
                <div id="content-a" class="text-display secondary" style="display:none"></div>
            </div>
            <div id="all-done-container" class="card" style="display:none;">
                <div class="text-display">🎉 All questions have been mastered!</div>
                <div style="margin-top: 30px;">
                    <span onclick="viewReport()" style="color: var(--accent); font-size: 1.1rem; font-weight: 600; cursor: pointer; text-decoration: underline;">View Report</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <div id="pre-answer-btns" style="display:none;">
                <button onclick="showAnswer()" class="btn-main">Show Answer (Space)</button>
            </div>
            <div id="post-answer-btns" style="display:none;">
                <div class="btn-row">
                    <button onclick="handleAction('forgotten')" class="btn-forgot">Forgot (F)</button>
                    <button onclick="handleAction('recognized')" class="btn-remember">Remembered (J)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Daily review limit modal -->
    <div id="daily-limit-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background-color: var(--card-bg, #fff); padding: 2rem; border-radius: 12px; max-width: 500px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <h2 style="margin-top: 0; color: var(--text-primary, #333);">Daily Review Setup</h2>
            <p style="color: var(--text-secondary, #666); margin-bottom: 1.5rem;">
                We have <span id="due-count" style="font-weight: bold;">0</span> cards due for review and
                <span id="new-count" style="font-weight: bold;">0</span> new cards to learn.
            </p>
            <p style="color: var(--text-secondary, #666); margin-bottom: 1.5rem;">
                How many cards would you like to review today? (Minimum: 5)
            </p>
            <div style="margin-bottom: 1.5rem;">
                <input type="number" id="daily-limit-input" min="5" value="20"
                       style="width: 100%; padding: 0.75rem; font-size: 1.1rem; border: 2px solid var(--border-color, #ccc); border-radius: 6px; background-color: var(--input-bg, #fff); color: var(--text-primary, #333);">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                <button id="daily-limit-cancel" style="padding: 0.75rem 1.5rem; border: 1px solid var(--border-color, #ccc); background-color: var(--btn-secondary, #f0f0f0); color: var(--text-primary, #333); border-radius: 6px; cursor: pointer;">Cancel</button>
                <button id="daily-limit-confirm" style="padding: 0.75rem 1.5rem; border: none; background-color: var(--accent, #007bff); color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">Start Review</button>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
